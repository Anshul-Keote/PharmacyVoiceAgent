<!DOCTYPE html>
<html>
<head>
  <title>Test Voice Agent</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', sans-serif; background: #1a1a2e; color: #fff; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
    .container { text-align: center; max-width: 500px; padding: 40px; }
    h1 { font-size: 24px; margin-bottom: 8px; }
    .subtitle { color: #888; margin-bottom: 30px; }
    .agent-select { margin-bottom: 20px; }
    .agent-select select { padding: 10px 16px; border-radius: 8px; border: 1px solid #333; background: #16213e; color: #fff; font-size: 14px; width: 100%; }
    .call-btn { padding: 16px 48px; font-size: 18px; border: none; border-radius: 50px; cursor: pointer; transition: all 0.3s; }
    .call-btn.start { background: #4ecca3; color: #1a1a2e; }
    .call-btn.start:hover { background: #3dbb91; }
    .call-btn.stop { background: #e74c3c; color: #fff; }
    .call-btn.stop:hover { background: #c0392b; }
    .call-btn:disabled { background: #333; color: #666; cursor: not-allowed; }
    .status { margin-top: 20px; font-size: 14px; color: #4ecca3; min-height: 20px; }
    .info { margin-top: 30px; padding: 20px; background: #16213e; border-radius: 12px; text-align: left; font-size: 13px; line-height: 1.8; color: #aaa; }
    .info span { color: #4ecca3; }
    .pulse { animation: pulse 1.5s infinite; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
  </style>
</head>
<body>
  <div class="container">
    <h1>CLRx Pharmacy Voice Agent</h1>
    <p class="subtitle">Test call with Sarah</p>

    <div class="agent-select">
      <select id="agentType">
        <option value="refill">Agent 1: Refill Reminder</option>
        <option value="newrx">Agent 2: New Rx Covered</option>
      </select>
    </div>

    <button class="call-btn start" id="callBtn">Start Call</button>
    <p class="status" id="status"></p>

    <div class="info">
      <strong>Sample Patient Data:</strong><br>
      <span>Name:</span> Atharva<br>
      <span>DOB:</span> December 5, 2003 (say this to verify)<br>
      <span>Drug:</span> Lisinopril tablet<br>
      <span>Copay:</span> $15.00<br>
      <span>Doctor:</span> Dr. Patel<br>
      <span>Insurance:</span> Blue Cross
    </div>
  </div>

  <script type="module">
    import { RetellWebClient } from 'https://esm.sh/retell-client-js-sdk@2.0.7';

    const API_KEY = 'key_853bce24cf8c8328e5306883abc2';
    const AGENTS = {
      refill: 'agent_509c6ce94b7e7382a1ca58c5ba',
      newrx: 'agent_9043ddc769a09be389737645b0',
    };

    let retellClient = null;
    let isCallActive = false;

    const sampleVars = {
      refill: {
        patient_first_name: 'Atharva',
        patient_dob: '2003-12-05',
        patient_age: '22',
        drug_name: 'Lisinopril tablet',
        drug_name_full: 'Lisinopril 10mg Tablets',
        copay: '$15.00',
        prescriber_last_name: 'Patel',
        insurance_name: 'Blue Cross',
        sub_group: 'commercial_no_rebate',
        pharmacy_name: 'CLRx Pharmacy',
        pharmacy_phone: '(504) 681-9885',
      },
      newrx: {
        patient_first_name: 'Atharva',
        patient_dob: '2003-12-05',
        patient_age: '22',
        drug_name: 'Eliquis tablet',
        drug_name_full: 'Eliquis 5mg Tablets',
        copay: '$45.00',
        prescriber_last_name: 'Patel',
        insurance_name: 'Blue Cross',
        sub_group: 'commercial_rebate',
        pharmacy_name: 'CLRx Pharmacy',
        pharmacy_phone: '(504) 681-9885',
      },
    };

    async function toggleCall() {
      if (isCallActive) {
        stopCall();
      } else {
        startCall();
      }
    }

    async function startCall() {
      const btn = document.getElementById('callBtn');
      const status = document.getElementById('status');
      const agentType = document.getElementById('agentType').value;

      btn.disabled = true;
      status.textContent = 'Connecting...';
      status.classList.add('pulse');

      try {
        // Create web call via API
        const res = await fetch('https://api.retellai.com/v2/create-web-call', {
          method: 'POST',
          headers: {
            'Authorization': `Bearer ${API_KEY}`,
            'Content-Type': 'application/json',
          },
          body: JSON.stringify({
            agent_id: AGENTS[agentType],
            retell_llm_dynamic_variables: sampleVars[agentType],
          }),
        });

        const data = await res.json();
        if (!res.ok) throw new Error(data.error_message || 'Failed to create call');

        // Connect via SDK
        retellClient = new RetellWebClient();

        retellClient.on('call_started', () => {
          status.textContent = 'Call active - speak now!';
          status.classList.remove('pulse');
        });

        retellClient.on('call_ended', () => {
          status.textContent = 'Call ended';
          status.classList.remove('pulse');
          resetBtn();
        });

        retellClient.on('error', (err) => {
          status.textContent = 'Error: ' + (err.message || err);
          status.classList.remove('pulse');
          resetBtn();
        });

        await retellClient.startCall({ accessToken: data.access_token });

        isCallActive = true;
        btn.disabled = false;
        btn.textContent = 'End Call';
        btn.className = 'call-btn stop';

      } catch (err) {
        status.textContent = 'Error: ' + err.message;
        status.classList.remove('pulse');
        resetBtn();
      }
    }

    function stopCall() {
      if (retellClient) {
        retellClient.stopCall();
        retellClient = null;
      }
      resetBtn();
    }

    function resetBtn() {
      const btn = document.getElementById('callBtn');
      isCallActive = false;
      btn.disabled = false;
      btn.textContent = 'Start Call';
      btn.className = 'call-btn start';
    }

    document.getElementById('callBtn').addEventListener('click', toggleCall);
  </script>
</body>
</html>
